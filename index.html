<!doctype html>
<html lang=en>

<head>
    <link rel="stylesheet" href="/bootstrap.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="manifest.json">
    <meta charset=utf-8>
    <title>WebSite</title>
</head>

<body>
    <div class="container">
        <form>
            <div class="form-group">
                <p>Plaintext</p>
                <input class="form-control" type="text" id="plaintext_utf8">
            </div>
            <div class="form-group">
                <p>Plaintext hexadecimal</p>
                <input class="form-control" type="text" id="plaintext" readonly>
            </div>
            <div class="form-group">
                <p>IV</p>
                <input class="form-control" type="text" id="IV" readonly>
            </div>
            <div class="form-group">
                <p>key</p>
                <input class="form-control" type="text" id="key">
            </div>
            <div class="form-group">
                <p>Cyphertext</p>
                <input class="form-control" type="text" id="encrypted">
            </div>
            <div class="form-check">
                <button id="encrypt_btn" type="button" class="btn btn-primary">Encrypt</button>
                <button id="decrypt_btn" type="button" class="btn btn-primary">Decrypt</button>
                <button id="keygen_btn" type="button" class="btn btn-primary">Generate new key</button>

                <button id="reset_cache" type="button" class="btn btn-warning">Reset Cache</button>
            </div>
        </form>
    </div>
    <script src="/bootstrap.js"></script>
    <script src="/main.js"></script>
</body>

</html>
