<!doctype html>
<html lang=en>

<head>
    <link rel="stylesheet" href="/bootstrap.css">
    <link rel="stylesheet" href="/style.css">
    <link rel="manifest" href="manifest.json">
    <meta charset=utf-8>
    <title>WebSite</title>
</head>

<body>
    <div class="container">

        <label>Plaintext</label>
        <div class="input-group">
            <button class="btn btn-outline-secondary" type="button" id="copy_plaintext">Copy</button>
            <button class="btn btn-outline-secondary" type="button" id="paste_plaintext">Paste</button>
            <input class="form-control" type="text" id="plaintext_utf8">
        </div>
        <label>Plaintext hexadecimal</label>
        <div class="input-group">
            <input class="form-control" type="text" id="plaintext" readonly>
        </div>
        <label>IV</label>
        <div class="input-group">
            <input class="form-control" type="text" id="IV" readonly>
        </div>
        <label>Key</label>
        <div class="input-group">
            <button class="btn btn-outline-secondary" type="button" id="copy_key">Copy</button>
            <button class="btn btn-outline-secondary" type="button" id="paste_key">Paste</button>
            <input class="form-control" type="text" id="key">
        </div>
        <label>Cyphertext</label>
        <div class="input-group">
            <button class="btn btn-outline-secondary" type="button" id="copy_cyphertext">Copy</button>
            <button class="btn btn-outline-secondary" type="button" id="paste_cyphertext">Paste</button>
            <input class="form-control" type="text" id="encrypted">
        </div>
        <br>
        <button id="encrypt_btn" type="button" class="btn btn-primary">Encrypt</button>
        <button id="decrypt_btn" type="button" class="btn btn-primary">Decrypt</button>
        <button id="keygen_btn" type="button" class="btn btn-primary">Generate new key</button>

        <button id="reset_cache" type="button" class="btn btn-warning">Reset Cache</button>
        <a type="button" class="btn btn-primary" href="rsa.html">To RSA</a>

    </div>
    <script src="/bootstrap.js"></script>
    <script src="/main.js"></script>
</body>

</html>
